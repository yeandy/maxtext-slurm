#===============================================================================
# Model Architecture: DeepSeek Proxy se0-e256-h4096
# tokenizer_path should be set to appropriate DS tokenizer

base_emb_dim: 4096
base_num_query_heads: 32
base_num_kv_heads: 8
base_num_decoder_layers: 64
head_dim: 128
mlp_activations: ["silu","linear"]
vocab_size: 102400
enable_dropout: False
logits_via_embedding: False
normalization_layer_epsilon: 1.0e-6

# **** CHANGE HERE (START) ****
base_mlp_dim: 2048
base_moe_mlp_dim: 2048
num_experts: 256
num_experts_per_tok: 4
#shared_experts: 0
# Use Mixtral decoder_block (instead of deepseek) and global attention (not MLA) for the Proxy
decoder_block: mixtral
attention_type: global
# **** CHANGE HERE (END) ****

# **** FOR REFERENCE ONLY, LIKELY NO CHANGE **** RoPE (Settings used by DeepSeek)
rope_type: yarn
rope_max_timescale: 10_000 # DeepSeek uses  "rope_theta": 10000
max_position_embeddings: 163840
original_max_position_embeddings: 4096
rope_factor: 40
beta_fast: 32
mscale: 0.707

# **** FOR REFERENCE ONLY ****: DeepSeek model has something like this
# decoder_block: deepseek
# attention_type: mla
# first_num_dense_layers: 0 # For DeepSeek decoder block, first_num_dense_layers: 1
# routed_scaling_factor: 1.0
# routed_score_func: softmax
# routed_bias: False
#===============================================================================

# ── Run Config ───────────────────────────────────────────────────────────────
base_config: base.yml
run_name: ds-proxy-se0-e256-h4096
hardware: gpu
# NOTE: inline model; omit model_name!
#model_name:

# ── Training ─────────────────────────────────────────────────────────────────
steps: 30000
log_period: 100
enable_goodput_recording: False
monitor_goodput: False

# ── Parallelism ──────────────────────────────────────────────────────────────
# At most one DCN axis can be unspecified (-1)
dcn_data_parallelism: -1
dcn_fsdp_parallelism: 8
dcn_sequence_parallelism: 1 # never recommended
dcn_context_parallelism: 1
dcn_tensor_parallelism: 1 # never recommended
dcn_pipeline_parallelism: 1
dcn_expert_parallelism: 1
# At most one ICI axis can be unspecified (-1)
ici_data_parallelism: 1
ici_fsdp_parallelism: 1
ici_sequence_parallelism: 1
ici_context_parallelism: 1
ici_tensor_parallelism: 1
ici_pipeline_parallelism: 1
ici_expert_parallelism: 8

# ── Batch & Sequence ─────────────────────────────────────────────────────────
per_device_batch_size: 24
max_target_length: 4096
packing: False
#num_layers_per_pipeline_stage: 4
#num_pipeline_microbatches: 64
gradient_accumulation_steps: 1

# ── Attention & Compute ──────────────────────────────────────────────────────
attention: cudnn_flash_te
remat_policy: full
use_iota_embed: True
scan_layers: True
logits_dot_in_fp32: False
shardy: False

# ── Dtypes & Quantization ────────────────────────────────────────────────────
dtype: bfloat16
weight_dtype: float32 # bfloat16
quantization: ""
quantize_kvcache: False
kv_quant_axis: heads_and_dkv
kv_quant_dtype: int8
checkpoint_is_quantized: False # Set to True if reading from a saved aqt quantized checkpoint

# ── MoE Runtime ──────────────────────────────────────────────────────────────
megablox: False
sparse_matmul: False
capacity_factor: 2
load_balance_loss_weight: 0.001
expert_balance: False
sharding_tolerance: 0.05

# ── Profiler ─────────────────────────────────────────────────────────────────
profiler: "" #"xplane"
upload_all_profiler_results: True
skip_first_n_steps_for_profiler: 3
profiler_steps: 1

# ── Checkpointing ────────────────────────────────────────────────────────────
enable_checkpointing: False
# NOTE: sync checkpointing waits indefinitely (no timeout)!
async_checkpointing: False
checkpoint_period: 200
max_num_checkpoints_to_keep: 12
# enable_single_replica_ckpt_restoring=True reduces shared storage read contention
# by having only one replica read from storage and broadcasting to others. This can
# cut restore time significantly (e.g. ~50min to ~10min for a 48-node job).
# NOTE: should likely be set to False when dcn_data_parallelism is a power of 2,
#       because in that case the checkpoint is globally sliced across DP replicas.
#
# BUG: causes a persistent ~1% TGS degradation after restore.
# Orbax's broadcast_one_replica_to_all (multislice.py:_merge_globalized_replicas)
# uses a JIT-compiled jnp.sum(axis=0) across the replica axis, which creates RCCL
# communicator groups with background threads (1 per GPU, 8 per node). These threads
# are never destroyed and spin-wait for the lifetime of the process, consuming CPU
# (~6pp higher utilization). This is an Orbax issue -- cannot be fixed from MaxText
# side. Needs an Orbax fix.
enable_single_replica_ckpt_restoring: True

# ── LR Schedule ──────────────────────────────────────────────────────────────
learning_rate: 2e-4 # Peak LR
cosine_learning_rate_final_fraction: 0.1 # Decay to 0.1x
warmup_steps_fraction: 0.1 # 10% steps warmup
learning_rate_schedule_steps: -1 # Use -1 to fall back to the value specified by `steps`

# ── Dataset ──────────────────────────────────────────────────────────────────
dataset_type: grain
grain_file_type: parquet
grain_train_files: /datasets/c4/en/3.0.1/parquet/c4-train-*-of-01024.parquet
grain_worker_count: 16
tokenizer_type: huggingface
tokenizer_path: deepseek-ai/DeepSeek-V2-Lite
# Set hf_access_token only if the tokenizer comes from a gated HuggingFace model
# (e.g. meta-llama/Llama-2-7b). Not needed for public models like DeepSeek-V2-Lite.
hf_access_token: ""
